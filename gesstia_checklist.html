<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Puntos Clave — Adecuación Ley 21.719 · GesstIA</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a1f33;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #818cf8;
    --accent-glow: rgba(129, 140, 248, 0.25);
    --green: #34d399;
    --green-dim: #065f46;
    --yellow: #fbbf24;
    --yellow-dim: #78350f;
    --red: #f87171;
    --red-dim: #7f1d1d;
    --print-bg: #ffffff;
    --print-text: #1e293b;
    --print-accent: #6366f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── Header ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .brand .tag {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    font-weight: 600;
  }

  .brand h1 {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .brand h1 span {
    color: var(--accent);
  }

  .brand .sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 0.15rem;
  }

  /* ── Score Panel ── */
  .score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .score-ring {
    position: relative;
    width: 88px;
    height: 88px;
    flex-shrink: 0;
  }

  .score-ring svg {
    transform: rotate(-90deg);
    width: 88px;
    height: 88px;
  }

  .score-ring .bg-circle {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 6;
  }

  .score-ring .progress-circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease, stroke 0.4s ease;
  }

  .score-ring .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 800;
  }

  .score-info {
    flex: 1;
  }

  .score-info .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 0.15rem;
  }

  .score-info .score-text {
    font-size: 0.95rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .score-info .score-text strong {
    color: var(--text);
  }

  .score-badge {
    display: inline-block;
    padding: 0.35rem 0.9rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.4rem;
  }

  .badge-optimo { background: var(--green-dim); color: var(--green); }
  .badge-avanzado { background: #1e3a5f; color: #60a5fa; }
  .badge-progreso { background: var(--yellow-dim); color: var(--yellow); }
  .badge-inicial { background: var(--red-dim); color: var(--red); }

  /* ── Actions bar ── */
  .actions {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.25rem;
    border-radius: 0.5rem;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.2s;
    user-select: none;
  }

  .btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0e1a;
  }

  .btn-primary:hover {
    background: #a5b4fc;
    border-color: #a5b4fc;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-danger {
    border-color: #7f1d1d;
    color: var(--red);
  }
  .btn-danger:hover {
    background: #7f1d1d;
    border-color: var(--red);
    color: #fff;
  }

  /* ── Categories ── */
  .category {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  .category-header {
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    gap: 0.75rem;
  }

  .category-header:hover {
    background: rgba(129, 140, 248, 0.04);
  }

  .category-header .cat-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .category-header .cat-number {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-glow);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .category-header h2 {
    font-size: 1rem;
    font-weight: 600;
  }

  .category-header .cat-progress {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .category-header .chevron {
    color: var(--text-dim);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }

  .category-header.collapsed .chevron {
    transform: rotate(-90deg);
  }

  .category-body {
    padding: 0 1.25rem 0.25rem;
    transition: max-height 0.3s ease, opacity 0.25s ease;
    max-height: 2000px;
    opacity: 1;
    overflow: hidden;
  }

  .category-header.collapsed + .category-body {
    max-height: 0;
    opacity: 0;
    padding: 0 1.25rem;
  }

  /* ── Checklist Items ── */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-bottom: 1px solid rgba(30, 41, 59, 0.5);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .check-item:last-child {
    border-bottom: none;
  }

  .check-item.done .item-text {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .custom-checkbox {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border: 2px solid var(--text-dim);
    border-radius: 4px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .check-item.done .custom-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .custom-checkbox::after {
    content: '';
    width: 6px;
    height: 10px;
    border: solid #0a0e1a;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .check-item.done .custom-checkbox::after {
    opacity: 1;
  }

  .item-number {
    font-size: 0.75rem;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 1.5rem;
    margin-top: 1px;
  }

  .item-text {
    font-size: 0.9rem;
    line-height: 1.45;
    flex: 1;
  }

  .check-item:hover .custom-checkbox {
    border-color: var(--accent);
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  .last-saved {
    margin-top: 0.3rem;
    font-size: 0.7rem;
    color: var(--text-dim);
    opacity: 0.7;
  }

  /* ── Reset toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    border-radius: 0.5rem;
    font-size: 0.85rem;
    color: var(--text);
    opacity: 0;
    transition: all 0.35s ease;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── PRINT STYLES ── */
  @media print {
    body {
      background: var(--print-bg) !important;
      color: var(--print-text) !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    .container {
      max-width: 100%;
      padding: 0.5in;
    }

    .no-print { display: none !important; }

    .score-panel {
      background: #f8fafc !important;
      border: 1px solid #cbd5e1 !important;
    }

    .score-ring .bg-circle { stroke: #e2e8f0 !important; }
    .score-ring .progress-circle { stroke: var(--print-accent) !important; }

    .category {
      background: #f8fafc !important;
      border: 1px solid #cbd5e1 !important;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .category-header { cursor: default !important; }
    .category-header:hover { background: transparent !important; }

    .check-item {
      cursor: default !important;
    }

    .custom-checkbox {
      border-color: #94a3b8 !important;
    }

    .check-item.done .custom-checkbox {
      background: var(--print-accent) !important;
      border-color: var(--print-accent) !important;
    }

    .custom-checkbox::after {
      border-color: #fff !important;
    }

    .check-item.done .item-text {
      color: #64748b !important;
    }

    .btn { display: none !important; }

    .brand h1 { font-size: 1.35rem; }

    footer { border-top-color: #cbd5e1 !important; }
    .last-saved { display: none; }

    .category-header.collapsed + .category-body {
      max-height: 2000px !important;
      opacity: 1 !important;
      padding: 0 1.25rem 0.25rem !important;
    }

    .category-header .chevron { display: none !important; }

    .badge-optimo { background: #d1fae5 !important; color: #065f46 !important; }
    .badge-avanzado { background: #dbeafe !important; color: #1e40af !important; }
    .badge-progreso { background: #fef3c7 !important; color: #78350f !important; }
    .badge-inicial { background: #fee2e2 !important; color: #991b1b !important; }
  }

  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .brand h1 { font-size: 1.2rem; }
    .score-panel { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .score-ring { width: 72px; height: 72px; }
    .score-ring svg { width: 72px; height: 72px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="tag">GesstIA · Checklist</div>
      <h1>30 Puntos Clave — <span>Adecuación Ley 21.719</span></h1>
      <div class="sub">Verifica el progreso de tu empresa en protección de datos personales</div>
    </div>
  </header>

  <!-- Score Panel -->
  <div class="score-panel" id="scorePanel">
    <div class="score-ring">
      <svg viewBox="0 0 88 88">
        <circle class="bg-circle" cx="44" cy="44" r="38"/>
        <circle class="progress-circle" id="progressCircle" cx="44" cy="44" r="38"
                stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
      </svg>
      <div class="score-number" id="scoreNumber">0%</div>
    </div>
    <div class="score-info">
      <div class="label">Progreso general</div>
      <div class="score-text" id="scoreText">
        <strong id="scoreCount">0</strong> de 30 ítems completados
      </div>
      <div class="score-badge" id="scoreBadge">Inicial</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions no-print">
    <button class="btn btn-primary" onclick="window.print()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5V2h8v3"/><rect x="2" y="5" width="12" height="6" rx="1"/><path d="M4 9h8v4H4z"/>
      </svg>
      Imprimir / PDF
    </button>
    <button class="btn" onclick="resetAll()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8a6 6 0 0 1 11.23-3M14 8a6 6 0 0 1-11.23 3"/><path d="M13 1.5V5H9.5M3 14.5V11h3.5"/>
      </svg>
      Reiniciar avance
    </button>
  </div>

  <!-- Categories (rendered by JS) -->
  <div id="checklist"></div>

  <!-- Footer -->
  <footer>
    <a href="https://gesstia.cl" target="_blank">gesstia.cl</a> · Checklist de adecuación Ley 21.719 sobre Protección de Datos Personales
    <div class="last-saved" id="lastSaved"></div>
  </footer>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data ──────────────────────────────────────────────────────────
const DATA = [
  {
    title: 'I. Diagnóstico y Planificación',
    items: [
      'Realicé un inventario completo de datos personales',
      'Identifiqué dónde se almacenan (servidores, nube, papel, email)',
      'Clasifiqué datos sensibles (salud, biometría, antecedentes)',
      'Tengo un plan de adecuación con fechas definidas'
    ]
  },
  {
    title: 'II. Registro de Actividades de Tratamiento (RAT)',
    items: [
      'Identifiqué todas las actividades de tratamiento',
      'Documenté la finalidad de cada tratamiento',
      'Determiné los plazos de conservación por categoría',
      'Elaboré el RAT completo'
    ]
  },
  {
    title: 'III. Consentimientos',
    items: [
      'Revisé todos los consentimientos vigentes',
      'Los consentimientos son específicos (no genéricos)',
      'El trabajador puede revocar el consentimiento',
      'Tengo registro de cuándo y cómo se obtuvo cada consentimiento'
    ]
  },
  {
    title: 'IV. Medidas de Seguridad',
    items: [
      'Datos de salud separados del resto de información laboral',
      'Controles de acceso por roles implementados',
      'Cifrado en tránsito (HTTPS) implementado',
      'Cifrado en reposo en servidores',
      'Política de contraseñas y autenticación'
    ]
  },
  {
    title: 'V. Proveedores y Terceros',
    items: [
      'Revisé contratos con proveedores que procesan datos',
      'Incluí cláusulas de protección de datos',
      'Firmé acuerdos de confidencialidad',
      'Designé DPO (interno o externo) si corresponde'
    ]
  },
  {
    title: 'VI. Capacitación y Políticas',
    items: [
      'Capacité al personal sobre manejo de datos',
      'Tengo política de protección de datos documentada',
      'La política está comunicada a todos los trabajadores',
      'Personal SST sabe qué datos NO compartir con gerencia'
    ]
  },
  {
    title: 'VII. Derechos ARCO y Brechas',
    items: [
      'Tengo procedimiento para responder solicitudes ARCO',
      'Designé responsable de responder ARCO',
      'Tengo protocolo de notificación de brechas',
      'El protocolo incluye notificación a APDP en 72 hrs',
      'Realicé al menos un ejercicio simulado de respuesta a brecha'
    ]
  }
];

// Flatten into global index
const NUM_ITEMS = DATA.reduce((s, c) => s + c.items.length, 0);
let state = {};

// ─── Persistence ──────────────────────────────────────────────────
const STORAGE_KEY = 'gesstia_checklist_30';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (typeof parsed === 'object' && parsed !== null) {
        state = parsed;
        return;
      }
    }
  } catch (_) {}
  state = {};
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  document.getElementById('lastSaved').textContent =
    'Última actualización: ' + new Date().toLocaleString('es-CL');
}

// ─── Render ────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  let globalIdx = 0;

  DATA.forEach((cat, ci) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'category';

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <div class="cat-left">
        <div class="cat-number">${String.fromCharCode(73 + ci)}</div>
        <h2>${cat.title}</h2>
      </div>
      <span class="cat-progress" id="catProg_${ci}">0/0</span>
      <span class="chevron">&#9660;</span>
    `;

    // collapse toggle (not in print)
    header.addEventListener('click', () => {
      header.classList.toggle('collapsed');
    });

    const body = document.createElement('div');
    body.className = 'category-body';

    cat.items.forEach((text) => {
      const key = '' + globalIdx;
      const done = !!state[key];

      const item = document.createElement('div');
      item.className = 'check-item' + (done ? ' done' : '');
      item.dataset.key = key;

      item.innerHTML = `
        <div class="custom-checkbox"></div>
        <span class="item-number">${globalIdx + 1}.</span>
        <span class="item-text">${text}</span>
      `;

      item.addEventListener('click', () => {
        const k = item.dataset.key;
        state[k] = !state[k];
        saveState();
        updateUI();
      });

      body.appendChild(item);
      globalIdx++;
    });

    catDiv.appendChild(header);
    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });

  updateUI();
}

// ─── Update UI ─────────────────────────────────────────────────────
function updateUI() {
  const done = Object.values(state).filter(Boolean).length;
  const pct = Math.round((done / NUM_ITEMS) * 100);

  // Score ring
  const circumference = 238.76;
  const offset = circumference - (pct / 100) * circumference;
  const circle = document.getElementById('progressCircle');
  circle.style.strokeDashoffset = offset;

  // Color the ring by level
  if (pct === 100) circle.style.stroke = '#34d399';
  else if (pct >= 67) circle.style.stroke = '#60a5fa';
  else if (pct >= 33) circle.style.stroke = '#fbbf24';
  else circle.style.stroke = '#818cf8';

  // Number
  document.getElementById('scoreNumber').textContent = pct + '%';
  document.getElementById('scoreCount').textContent = done;

  // Badge
  const badge = document.getElementById('scoreBadge');
  if (pct === 100) {
    badge.textContent = 'Óptimo';
    badge.className = 'score-badge badge-optimo';
    document.getElementById('scoreText').querySelector('strong').textContent = '¡Completado!';
  } else if (pct >= 67) {
    badge.textContent = 'Avanzado';
    badge.className = 'score-badge badge-avanzado';
  } else if (pct >= 33) {
    badge.textContent = 'En Progreso';
    badge.className = 'score-badge badge-progreso';
  } else {
    badge.textContent = 'Inicial';
    badge.className = 'score-badge badge-inicial';
  }

  if (pct < 100) {
    document.getElementById('scoreCount').textContent = done;
  }

  // Category progress bars
  let idx = 0;
  DATA.forEach((cat, ci) => {
    let catDone = 0;
    cat.items.forEach(() => {
      if (state['' + idx]) catDone++;
      idx++;
    });
    const el = document.getElementById('catProg_' + ci);
    if (el) el.textContent = catDone + '/' + cat.items.length;
  });

  // Item classes
  document.querySelectorAll('.check-item').forEach(el => {
    const k = el.dataset.key;
    if (state[k]) el.classList.add('done');
    else el.classList.remove('done');
  });
}

// ─── Reset ─────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('¿Reiniciar todo el avance? Esta acción no se puede deshacer.')) return;
  state = {};
  saveState();
  updateUI();
  showToast('Avance reiniciado correctamente');
}

// ─── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Init ──────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
